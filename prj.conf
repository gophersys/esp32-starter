# Your boards are ESP32 rev v1.0 silicon — Zephyr refuses to boot them without this.
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

CONFIG_LOG=y

# Z-stage: preempt equal-priority threads every 1ms so data races are real
CONFIG_TIMESLICING=y
CONFIG_TIMESLICE_SIZE=1
CONFIG_TIMESLICE_PRIORITY=5

# runtime thread stacks (k_thread_stack_alloc) instead of DEFINE macros
CONFIG_DYNAMIC_THREAD=y
CONFIG_DYNAMIC_THREAD_ALLOC=y
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_CRC=y
